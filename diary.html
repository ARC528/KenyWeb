<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>御心 | DIARY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./diary.css" />
  <link rel="stylesheet" href="./common.css" />
</head>
<body>
  <main class="diary-site">
    <aside class="page-sidebar">
      <a class="page-brand" href="./index.html" aria-label="トップページへ">
        <span>健一の楽曲</span>
        <small>＋ 異界地図</small>
      </a>

      <nav class="page-nav" aria-label="メインメニュー">
        <a href="./about.html"><span>今</span><small>今日は<br>ABOUT</small></a>
        <a class="active" href="./diary.html"><span>御</span><small>御心<br>DIARY</small></a>
        <a href="./songs.html"><span>♪</span><small>音<br>SONGS</small></a>
      </nav>

      <p class="page-copy">あなたの心に、<br>そっと灯す音を。</p>
      <div class="page-lantern" aria-hidden="true"></div>
    </aside>

    <section class="diary-index">
      <header class="diary-title">
        <div class="seal">御</div>
        <div>
          <h1>御心</h1>
          <p class="en">DIARY</p>
          <p class="lead">日々のこと、心に浮かんだこと</p>
        </div>
      </header>

      <div class="divider"></div>
      <div id="entryList" class="entry-list" aria-label="日記一覧"></div>
    </section>

    <section class="diary-article" aria-live="polite">
      <article class="paper-card" id="article">
        <p class="article-date" id="articleDate"></p>
        <div class="mini-divider"></div>
        <h2 id="articleTitle">読み込み中...</h2>
        <div class="article-image-wrap" id="articleImageWrap" hidden>
          <img id="articleImage" alt="" />
        </div>
        <div class="article-body" id="articleBody"></div>
        <a class="back-link" href="#list">＜ 一覧に戻る</a>
      </article>
    </section>
  </main>

  <script src="./diary.js"></script>
</body>
</html>
